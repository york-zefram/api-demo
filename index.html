<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM CORE ACTIVATOR</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; --green: #00ff88; }
        html, body { margin: 0; background: var(--black); color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }

        .z-panel {
            width: 90%; max-width: 400px; padding: 40px 20px; border: 1px solid var(--pink);
            background: rgba(10, 10, 10, 0.8); text-align: center; box-shadow: 0 0 30px rgba(255, 0, 127, 0.2);
        }

        h1 { font-size: 1.5rem; color: var(--pink); letter-spacing: 6px; margin-bottom: 5px; }
        .sub { font-size: 0.65rem; color: #666; letter-spacing: 2px; margin-bottom: 40px; }

        .z-btn {
            background: transparent; color: var(--pink); border: 1px solid var(--pink);
            padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 0.8rem;
            transition: 0.2s; letter-spacing: 1px;
        }
        .z-btn:hover { background: var(--pink); color: white; }

        .input-area { margin-top: 40px; }
        input[type="text"] {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333;
            color: var(--green); font-family: monospace; text-align: center; outline: none; box-sizing: border-box;
        }
        input[type="text"]:focus { border-color: var(--pink); }

        #status { font-size: 0.65rem; margin-top: 15px; height: 1.2rem; letter-spacing: 1px; }
        .success { color: var(--green); }
        
        .hint { font-size: 0.7rem; color: #444; margin-top: 40px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="z-panel">
    <h1>ZEFRAM</h1>
    <div class="sub">CORE SETUP TERMINAL</div>

    <button class="z-btn" onclick="openGoogle()">OPEN GOOGLE TERMINAL</button>

    <div class="input-area">
        <input type="text" id="api-key" placeholder="PASTE CORE KEY" oninput="checkKey()">
        <div id="status">AWAITING KEY INJECTION...</div>
    </div>

    <div class="hint">
        [1] ターミナルを開き API KEY を発行<br>
        [2] 生成されたコードをここに注入
    </div>
</div>

<script>
    function openGoogle() {
        const w = 700;
        const h = 800;
        const left = (window.screen.width / 2) - (w / 2);
        const top = (window.screen.height / 2) - (h / 2);
        
        // 画面中央に「ポップアップ」としてGoogleを召喚
        window.open('https://console.cloud.google.com/apis/credentials', 'z_terminal', 
            `width=${w},height=${h},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no`);
    }

    async function checkKey() {
        const val = document.getElementById('api-key').value.trim();
        const status = document.getElementById('status');
        if (val.length < 30) return;

        status.innerHTML = "VALIDATING...";

        try {
            const url = `https://www.googleapis.com/youtube/v3/videoCategories?part=snippet&regionCode=JP&key=${val}`;
            const res = await fetch(url);
            if (res.ok) {
                localStorage.setItem('ZEFRAM_API_KEY', val);
                status.innerHTML = "<span class='success'>CORE ACTIVATED. READY.</span>";
                document.querySelector('.z-panel').style.borderColor = "var(--green)";
            } else {
                status.innerHTML = "INVALID KEY.";
            }
        } catch (e) {
            status.innerHTML = "CONNECTION ERROR.";
        }
    }
</script>

</body>
</html>
