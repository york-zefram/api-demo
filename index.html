<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM API SETUP - INTEGRATED</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; --gray: #1a1a1a; --green: #00ff88; }
        html, body { margin: 0; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* メインコンテナ */
        .container { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 20px; box-sizing: border-box; text-align: center;
        }

        h1 { font-size: 1.5rem; color: var(--pink); letter-spacing: 4px; margin-bottom: 5px; text-transform: uppercase; }
        .sub-title { font-size: 0.7rem; color: #666; margin-bottom: 40px; letter-spacing: 1px; }

        /* ステップカード */
        .card { 
            background: var(--gray); width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; position: relative;
        }

        .step-indicator { font-size: 0.6rem; color: var(--pink); font-weight: bold; margin-bottom: 10px; display: block; }
        .instruction { font-size: 0.9rem; margin-bottom: 25px; color: #eee; }

        /* ZEFRAMボタン */
        .z-btn {
            display: block; width: 100%; padding: 15px; background: transparent; color: var(--pink);
            border: 1px solid var(--pink); border-radius: 4px; font-weight: bold; cursor: pointer;
            text-decoration: none; font-size: 0.8rem; transition: 0.2s; margin-bottom: 10px;
        }
        .z-btn:hover { background: rgba(255, 0, 127, 0.1); box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); }
        .z-btn:active { transform: scale(0.98); }

        /* 入力エリア */
        input[type="text"] {
            width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: var(--green);
            border-radius: 4px; box-sizing: border-box; font-family: monospace; font-size: 0.85rem;
            outline: none; margin-top: 20px; text-align: center;
        }

        #status { margin-top: 15px; font-size: 0.7rem; height: 1rem; }
        .success { color: var(--green); }
        .error { color: var(--pink); }

        /* 背景の演出 */
        .bg-text { 
            position: absolute; font-size: 10vw; color: rgba(255, 255, 255, 0.02); 
            font-weight: 900; z-index: -1; user-select: none; white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="bg-text">ZEFRAM SYSTEM</div>

<div class="container">
    <h1>ZEFRAM</h1>
    <div class="sub-title">CORE ACTIVATION SYSTEM</div>

    <div class="card">
        <span class="step-indicator">SYSTEM STATUS: WAITING FOR KEY</span>
        <div class="instruction">Google Cloudを呼び出し、「鍵」を生成してください。</div>
        
        <button class="z-btn" onclick="openStep('https://console.cloud.google.com/flows/enableapi?apiid=youtube.googleapis.com')">1. APIを有効化</button>
        <button class="z-btn" onclick="openStep('https://console.cloud.google.com/apis/credentials')">2. 鍵を発行</button>

        <input type="text" id="api-key-input" placeholder="PASTE YOUR API KEY HERE" oninput="validateKey()">
        <div id="status"></div>
    </div>

    <div style="margin-top: 30px; font-size: 0.6rem; color: #444; letter-spacing: 2px;">
        DESIGNED BY STUDIO ZEFRAM / NAGANO
    </div>
</div>

<script>
    // Googleの設定画面を「ZEFRAMの小窓」として制御
    function openStep(url) {
        const width = 600;
        const height = 700;
        const left = (window.innerWidth / 2) - (width / 2);
        const top = (window.innerHeight / 2) - (height / 2);
        
        window.open(url, 'googleControl', `width=${width},height=${height},top=${top},left=${left},scrollbars=yes`);
    }

    async function validateKey() {
        const key = document.getElementById('api-key-input').value.trim();
        const status = document.getElementById('status');
        
        if (key.length < 30) { status.innerHTML = ""; return; }
        status.innerHTML = "AUTHENTICATING...";
        status.className = "";

        try {
            const url = `https://www.googleapis.com/youtube/v3/videoCategories?part=snippet&regionCode=JP&key=${key}`;
            const res = await fetch(url);
            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('ZEFRAM_API_KEY', key);
                status.innerHTML = "CORE ACTIVATED. READY TO DANCE.";
                status.className = "success";
                document.querySelector('.card').style.borderColor = "var(--green)";
            } else {
                status.innerHTML = "INVALID KEY. CHECK SETTINGS.";
                status.className = "error";
            }
        } catch (e) {
            status.innerHTML = "NETWORK ERROR. USE HTTPS.";
            status.className = "error";
        }
    }

    window.onload = () => {
        const savedKey = localStorage.getItem('ZEFRAM_API_KEY');
        if (savedKey) {
            document.getElementById('api-key-input').value = savedKey;
            validateKey();
        }
    };
</script>

</body>
</html>
