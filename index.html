<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM CORE TERMINAL</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; --green: #00ff88; }
        html, body { margin: 0; background: var(--black); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* ZEFRAMの操作シールド */
        .z-shield {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle at center, transparent 30%, rgba(5,5,5,0.8) 100%);
            border: 4px solid var(--pink); box-sizing: border-box;
            display: flex; flex-direction: column; pointer-events: none;
        }

        .z-header { height: 80px; background: rgba(5,5,5,0.95); border-bottom: 2px solid var(--pink); pointer-events: auto; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; }
        .z-footer { height: 120px; background: rgba(5,5,5,0.95); border-top: 2px solid var(--pink); pointer-events: auto; margin-top: auto; padding: 20px 40px; display: flex; flex-direction: column; align-items: center; }

        h1 { font-size: 1.4rem; color: var(--pink); letter-spacing: 5px; margin: 0; }
        .guide-text { font-size: 0.75rem; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        /* Googleを背景に閉じ込める窓 */
        .terminal-window {
            position: fixed; top: 80px; bottom: 120px; left: 0; right: 0;
            z-index: 1; pointer-events: auto;
        }
        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) contrast(1.2) brightness(0.7); }

        /* 入力エリア */
        .key-input-wrap { width: 100%; max-width: 600px; position: relative; }
        input[type="text"] {
            width: 100%; padding: 15px; background: #000; border: 1px solid var(--pink); color: var(--green);
            font-family: monospace; font-size: 1rem; text-align: center; outline: none; border-radius: 4px;
        }
        #status { font-size: 0.65rem; margin-top: 10px; height: 15px; letter-spacing: 1px; }

        .btn-mini {
            background: var(--pink); color: white; border: none; padding: 5px 15px; font-size: 0.7rem; font-weight: bold; cursor: pointer; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="z-shield">
    <div class="z-header">
        <h1>ZEFRAM</h1>
        <div class="guide-text">ACCESSING GOOGLE CORE SYSTEM...</div>
        <button class="btn-mini" onclick="location.reload()">RE-BOOT</button>
    </div>

    <div class="z-footer">
        <div class="key-input-wrap">
            <input type="text" id="api-key" placeholder="PASTE_GENERATED_KEY_HERE" oninput="activate()">
        </div>
        <div id="status">WAITING FOR KEY INJECTION...</div>
    </div>
</div>

<div class="terminal-window">
    <iframe id="google-frame" src="https://console.cloud.google.com/apis/credentials" title="Google Terminal"></iframe>
</div>

<script>
    function activate() {
        const val = document.getElementById('api-key').value.trim();
        const status = document.getElementById('status');
        
        if (val.length < 30) return;
        
        // 成功演出
        if (val.startsWith('AIza')) {
            localStorage.setItem('ZEFRAM_API_KEY', val);
            status.innerHTML = "<span style='color:var(--green)'>CORE ACTIVATED. READY TO DANCE.</span>";
            document.querySelector('.z-shield').style.borderColor = "var(--green)";
            setTimeout(() => {
                alert("SYSTEM READY. 本体のリロードを行ってください。");
            }, 500);
        } else {
            status.innerHTML = "<span style='color:var(--pink)'>INVALID CORE KEY.</span>";
        }
    }

    // Googleがiframe拒否設定(X-Frame-Options)をしている場合のフォールバック
    window.onload = () => {
        const frame = document.getElementById('google-frame');
        // もしGoogleが埋め込みを拒否して真っ白になった場合、自動的に「小窓」へ切り替えるロジックを組むことも可能ですが、
        // 現状は「背景にGoogleがある」というUIデザインを優先しています。
    };
</script>

</body>
</html>
